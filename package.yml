package: d2u_history
version: '1.1.0'
author: Tobias Krais

page:
    title: 'translate:d2u_history'
    perm: 'd2u_history[]'
    icon: rex-icon fa-history
    subpages:
        history: { title: 'translate:d2u_history_events', icon: rex-icon fa-history }
        settings:
            icon: rex-icon rex-icon-system
            title: ''
            itemClass: pull-right
            subpages:
                settings: { title: 'translate:d2u_helper_settings', icon: rex-icon rex-icon-system, perm: 'd2u_history[settings]' }
                setup: { title: 'translate:d2u_helper_setup', icon: rex-icon rex-icon-install, perm: 'd2u_history[settings]' }
        help:
            title: ''
            icon: rex-icon rex-icon-help
            itemClass: pull-right
            subpages:
                changelog: { title: 'translate:d2u_helper_help_chapter_changelog' }

requires:
    packages:
        d2u_helper: '>=2.1.0'
    php: '>=8.0'
        
installer_ignore:
    - .github